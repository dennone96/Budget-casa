<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface-2: #f0efe9;
    --text-primary: #16160f;
    --text-secondary: #5c5b54;
    --text-muted: #8a8980;
    --border: #e2e0d8;
    --accent: #378ADD;
    --success: #1D9E75;
    --danger: #D85A30;
    --radius: 10px;
    --sidebar-w: 220px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16160f;
      --surface: #201f19;
      --surface-2: #2a2922;
      --text-primary: #f5f4f0;
      --text-secondary: #b5b3a8;
      --text-muted: #8a8980;
      --border: #3a382f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
  }

  /* ── LOGIN ── */
  #login-screen {
    max-width: 360px;
    margin: 4rem auto;
    padding: 0 1rem;
  }
  #login-screen h1 { text-align: center; font-size: 22px; font-weight: 600; }
  #login-screen .panel { display: flex; flex-direction: column; gap: 10px; }
  #login-screen input { width: 100%; }
  #login-screen button[type="submit"] { width: 100%; }
  #login-error { color: var(--danger); font-size: 13px; min-height: 18px; margin: 0; }
  #login-toggle { background: none; border: none; color: var(--accent); text-decoration: underline; height: auto; padding: 0; width: auto; }

  /* ── LAYOUT ── */
  #shell { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.25s ease;
  }
  #sidebar-logo {
    padding: 1.25rem 1rem 1rem;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-logo i { font-size: 20px; color: var(--accent); }
  #sidebar nav { flex: 1; padding: 0.75rem 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 1rem;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 0;
    transition: background 0.12s, color 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    height: auto;
  }
  .nav-item i { font-size: 18px; }
  .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
  .nav-item.active { background: var(--surface-2); color: var(--accent); font-weight: 600; }
  #sidebar-footer {
    padding: 1rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  #sidebar-user-email { display: block; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #btn-logout {
    width: 100%;
    font-size: 13px;
    height: 34px;
    background: none;
    border: 1px solid var(--border);
  }

  /* ── HAMBURGER (mobile) ── */
  #hamburger {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 40px; height: 40px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 99;
  }

  /* ── MAIN CONTENT ── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 1.75rem 1.5rem 3rem;
    max-width: 780px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    #hamburger { display: flex; }
    #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }
    #main { margin-left: 0; padding: 1rem 0.9rem 3rem; padding-top: 3.5rem; }
  }

  /* ── PAGINE ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── COMPONENTI COMUNI ── */
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 1.25rem; }
  h2 { font-size: 17px; font-weight: 600; margin: 0; }
  h3 { font-size: 15px; font-weight: 600; margin: 0 0 0.75rem; }
  .home-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .home-header h1 { margin: 0; }
  .home-date-filter {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .home-date-field {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .home-date-field label {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .home-date-field input {
    width: 145px;
  }
  .home-date-field select {
    min-width: 130px;
  }
  .filter-custom-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 38px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    cursor: pointer;
  }
  .filter-custom-toggle input {
    width: 16px;
    height: 16px;
    padding: 0;
    margin: 0;
  }
  .custom-date-range {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  #btn-apply-range {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  #filter-label {
    width: 100%;
    font-size: 12px;
    color: var(--text-muted);
    margin: 0;
    text-align: right;
  }
  @media (max-width: 680px) {
    .home-header { align-items: stretch; }
    .home-date-filter { justify-content: flex-start; width: 100%; }
    .home-date-field { flex: 1 1 130px; }
    .home-date-field input,
    .home-date-field select { width: 100%; }
    .filter-custom-toggle { flex: 1 1 100%; justify-content: center; }
    .custom-date-range { width: 100%; }
    #btn-apply-range { flex: 1 1 100%; justify-content: center; }
    #filter-label { text-align: left; }
  }
  .stats-row { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface-2);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    flex: 1;
    min-width: 120px;
  }
  .stat-card p:first-child { font-size: 13px; color: var(--text-secondary); margin: 0 0 4px; }
  .stat-card p:last-child { font-size: 20px; font-weight: 600; margin: 0; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  input, select, button {
    font-family: inherit;
    font-size: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    padding: 8px 10px;
    height: 38px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button { cursor: pointer; font-weight: 500; transition: background 0.15s; }
  button:hover { background: var(--surface-2); }
  button:active { transform: scale(0.98); }
  .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .tabs button { flex: 1; }
  .tabs button.active { background: var(--surface-2); border-color: var(--text-secondary); }
  .form-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-row-2 { display: flex; gap: 8px; align-items: center; }
  .form-row-2 input[type="date"] { flex: 1; }
  .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .row-between select { width: auto; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .chart-wrap { position: relative; width: 100%; height: 260px; }
  .budget-row { margin-bottom: 10px; }
  .budget-row .top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .bar-bg { width: 100%; height: 6px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; }
  .tx-row {
    display: grid;
    grid-template-columns: 90px 1fr 100px 90px 84px;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface-2);
    border-radius: var(--radius);
    margin-bottom: 6px;
    cursor: default;
  }
  .tx-row:hover { background: var(--surface); }
  .tx-col-date { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
  .tx-col-desc { min-width: 0; cursor: pointer; }
  .tx-col-desc:hover .tx-desc-text { text-decoration: underline; text-decoration-color: var(--text-muted); }
  .tx-desc-text { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .tx-col-amount { font-size: 14px; font-weight: 700; text-align: right; white-space: nowrap; }
  .tx-col-type { display: flex; align-items: center; justify-content: center; }
  .tx-col-actions { display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
  /* Header colonne */
  .tx-header {
    display: grid;
    grid-template-columns: 90px 1fr 100px 90px 84px;
    gap: 8px;
    padding: 4px 14px 6px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  @media (max-width: 560px) {
    .tx-row, .tx-header { grid-template-columns: 70px 1fr 80px 0 80px; }
    .tx-col-type { display: none; }
  }

  /* Modal dettaglio movimento */
  #detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(3px);
    z-index: 500; align-items: center; justify-content: center;
    padding: 1rem; pointer-events: none;
  }
  #detail-overlay.open { display: flex; pointer-events: all; }
  #detail-box {
    background: var(--surface); border-radius: 16px;
    padding: 1.5rem; width: 100%; max-width: 460px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
  }
  #detail-box h3 { margin: 0 0 1rem; font-size: 17px; font-weight: 700; }
  .detail-field { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .detail-field:last-of-type { border-bottom: none; }
  .detail-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); margin-bottom: 3px; }
  .detail-field p { margin: 0; font-size: 14px; font-weight: 500; word-break: break-word; }
  .detail-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .detail-actions button { flex: 1; height: 42px; font-size: 14px; font-weight: 600; border-radius: 999px; }
  .btn-delete {
    border: none; background: none; padding: 0;
    height: 40px; width: 40px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px; transition: transform 0.15s, opacity 0.15s;
  }
  .btn-delete:hover { opacity: 0.8; transform: scale(1.08); background: none !important; border: none !important; }
  .btn-delete::before { display: none; }
  .btn-edit-tx {
    border: none; background: none; padding: 0;
    height: 40px; width: 40px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px; transition: transform 0.15s, opacity 0.15s;
  }
  .btn-edit-tx:hover { opacity: 0.8; transform: scale(1.08); background: none !important; border: none !important; }
  .icon-matita { width: 34px; height: 34px; pointer-events: none; }
  .icon-cestino { width: 34px; height: 34px; pointer-events: none; }
